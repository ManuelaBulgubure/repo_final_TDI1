<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Noticias - DigitalData</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark_mode.css">
    <link rel="stylesheet" href="css/api_externas.css">
 </head>
<body>
    <header class="header-principal">
        <img src="assets/imagen_logo.png" alt="Logo DigitalData" id="imagen_logo">
        <section class="contenedor-buscador">
            <input type="text" id="buscador" placeholder="Buscar noticias...">
        </section>
     
        <nav class="menu">
            <a href="admin.html" id="enlace-login"> 👩🏻‍💻Loguearse</a>
        </nav>
    </header>

    <section id="contenedor-principal"> 
        <main id="contenedor-noticias"> </main>
        
        <aside id="aside">
            <section class="aside-card aside-dolar">
                <h3>Cotización del Dólar💵</h3>

                <form id="form-dolar">
                    <label for="fecha-dolar">Seleccioná una fecha: </label>
                    <input type="date" id="fecha-dolar" name="fecha" max="" required>
                    <button type="submit">Consultar cotización</button>
                </form>
                
                <section id="contenedor-cotizaciones">
                    <p>Cargando última cotización⏳...</p>
                </section>
            </section>

            <section class="aside-card aside-clima">
                <h3>Clima de Rosario ☀️</h3>
                <section id="clima-container" class="clima-box">
                    <p class="cargando">Consultando satélite meteorológico...</p>
                </section>
            </section>
        </aside>
    
    </section>
    <footer>
    <p>&copy; 2026 DigitalData. Todos los derechos reservados. Boglic. Bulgubure. Milberg. Guerscovich </p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/dark_mode.js"></script>
    <script src="js/api_externas.js"></script> 
</body>
</html>
